<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bydelsnytt Oslo</title>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0;
    padding: 48px 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fafaf9;
    color: #1a1a1a;
    line-height: 1.5;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }
  h1 { font-size: 28px; margin: 0 0 8px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
  .card {
    background: #fff;
    border: 1px solid #e5e5e4;
    border-radius: 10px;
    padding: 20px;
  }
  .card p { margin: 0 0 12px; }
  .card p:last-child { margin: 0; }
  code { background: #f3f3f1; padding: 1px 6px; border-radius: 4px; font-size: 90%; }
</style>
</head>
<body>
<h1>Bydelsnytt Oslo</h1>
<p class="subtitle">Lokalnytt fra alle 15 bydeler i Oslo &mdash; oppdateres automatisk hver morgen.</p>
<div class="card">
  <p><strong>Under oppbygging.</strong> Denne siden oppdateres automatisk kl. 07:01 hver morgen med ferske saker fra hver bydel.</p>
  <p>F&oslash;rste fullstendige utgave publiseres i morgen tidlig.</p>
</div>
</body>
</html>
